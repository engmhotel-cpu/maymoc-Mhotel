<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kỹ Thuật — HK Hotel</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0F1923;
  --surface: #1A2736;
  --surface2: #243447;
  --surface3: #2E4159;
  --accent: #00C2A8;
  --accent-dim: rgba(0,194,168,0.15);
  --warn: #FF6B35;
  --warn-dim: rgba(255,107,53,0.15);
  --ok: #00C2A8;
  --fault: #FF6B35;
  --pending: #F0B429;
  --pending-dim: rgba(240,180,41,0.15);
  --text: #E8EDF2;
  --muted: #6B8299;
  --border: rgba(255,255,255,0.07);
  --radius: 10px;
  --nav-h: 64px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; }

/* ── LOGIN ── */
#loginScreen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(160deg, #0F1923 60%, #1a2d40);
  padding: 24px;
}
.login-box {
  width: 100%; max-width: 360px; background: var(--surface);
  border-radius: 16px; padding: 36px 28px; border: 1px solid var(--border);
}
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo .brand { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
.login-logo .sub { font-size: 12px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
.form-group input {
  width: 100%; padding: 12px 14px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px; color: var(--text);
  font-size: 15px; outline: none; transition: border-color .2s;
}
.form-group input:focus { border-color: var(--accent); }
.btn-login {
  width: 100%; padding: 13px; background: var(--accent); color: #0F1923;
  font-weight: 700; font-size: 15px; border: none; border-radius: 8px;
  cursor: pointer; margin-top: 8px; letter-spacing: .5px; transition: opacity .2s;
}
.btn-login:hover { opacity: .85; }
.login-err { color: var(--fault); font-size: 13px; text-align: center; margin-top: 12px; min-height: 18px; }

/* ── APP SHELL ── */
#appShell { display: none; flex-direction: column; min-height: 100vh; }
.top-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.top-bar .app-title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
.top-bar .user-info { font-size: 12px; color: var(--muted); text-align: right; }
.top-bar .user-info strong { color: var(--text); display: block; }
.btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; margin-left: 10px; }
.btn-logout:hover { color: var(--fault); border-color: var(--fault); }

/* ── NAV TABS ── */
.nav-tabs {
  display: flex; background: var(--surface); border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none; position: sticky; top: 57px; z-index: 99;
}
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab {
  flex-shrink: 0; padding: 10px 16px; font-size: 12px; font-weight: 600;
  color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
  white-space: nowrap; transition: color .2s, border-color .2s; text-transform: uppercase; letter-spacing: .5px;
}
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.nav-tab:hover { color: var(--text); }

/* ── CONTENT ── */
.content { flex: 1; padding: 16px; max-width: 720px; margin: 0 auto; width: 100%; padding-bottom: 32px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── DATE BAR ── */
.date-bar {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  background: var(--surface); border-radius: var(--radius); padding: 10px 14px;
  border: 1px solid var(--border);
}
.date-bar label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
.date-bar input[type=date] {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); padding: 6px 10px; font-size: 13px; outline: none;
}
.btn-today {
  background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent);
  border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
}

/* ── CARDS ── */
.section-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700;
  color: var(--text); letter-spacing: 1px; margin: 20px 0 10px; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.section-title .badge {
  font-size: 11px; background: var(--surface2); color: var(--muted);
  padding: 2px 8px; border-radius: 20px; font-weight: 500;
}
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: flex-start;
  gap: 12px; cursor: pointer; transition: border-color .2s, background .2s;
}
.card:hover { border-color: var(--surface3); background: var(--surface2); }
.card.done { border-left: 3px solid var(--ok); }
.card.fault { border-left: 3px solid var(--fault); }
.card.pending { border-left: 3px solid var(--pending); }

.card-icon {
  width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center;
  justify-content: center; font-size: 18px; flex-shrink: 0; background: var(--surface2);
}
.card-body { flex: 1; }
.card-title { font-weight: 600; color: var(--text); font-size: 14px; margin-bottom: 3px; }
.card-sub { font-size: 12px; color: var(--muted); }
.card-meta { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }

.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .5px;
}
.pill.ok { background: var(--accent-dim); color: var(--ok); }
.pill.fault { background: var(--warn-dim); color: var(--fault); }
.pill.pending { background: var(--pending-dim); color: var(--pending); }
.pill.info { background: var(--surface2); color: var(--muted); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.dot.pulse { animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 1000; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(3px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); width: 100%; max-width: 520px;
  border-radius: 16px 16px 0 0; padding: 0; overflow: hidden;
  max-height: 92vh; display: flex; flex-direction: column;
  animation: slideUp .25s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-header {
  padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; padding: 4px; }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-shrink: 0; }

/* ── FORM ── */
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
.field input, .field select, .field textarea {
  width: 100%; padding: 11px 13px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px; color: var(--text);
  font-size: 14px; outline: none; font-family: inherit; transition: border-color .2s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 80px; }
.field select option { background: var(--surface2); }
.radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
.radio-btn {
  flex: 1; min-width: 80px; padding: 10px 8px; border-radius: 8px; border: 2px solid var(--border);
  text-align: center; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--muted);
  transition: all .2s; user-select: none;
}
.radio-btn.ok.sel { border-color: var(--ok); background: var(--accent-dim); color: var(--ok); }
.radio-btn.fault.sel { border-color: var(--fault); background: var(--warn-dim); color: var(--fault); }
.radio-btn.pending.sel { border-color: var(--pending); background: var(--pending-dim); color: var(--pending); }
.radio-btn:hover { border-color: var(--surface3); }

.btn { padding: 11px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: opacity .2s; flex: 1; }
.btn:hover { opacity: .85; }
.btn-primary { background: var(--accent); color: #0F1923; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: var(--warn-dim); color: var(--fault); border: 1px solid var(--fault); }

/* ── LOG TABLE ── */
.log-table-wrap { overflow-x: auto; margin-top: 8px; border-radius: var(--radius); border: 1px solid var(--border); }
.log-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.log-table th { background: var(--surface2); color: var(--muted); text-transform: uppercase; letter-spacing: .5px; padding: 10px 12px; text-align: left; font-weight: 600; white-space: nowrap; }
.log-table td { padding: 10px 12px; border-top: 1px solid var(--border); color: var(--text); vertical-align: middle; }
.log-table tr:hover td { background: var(--surface2); }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty .icon { font-size: 36px; margin-bottom: 10px; opacity: .4; }
.empty p { font-size: 13px; }

/* ── LOADING ── */
.spinner { text-align: center; padding: 30px; color: var(--muted); }
.spinner::before { content: ''; display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 10px; vertical-align: middle; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface2); color: var(--text); padding: 12px 20px; border-radius: 24px;
  font-size: 13px; font-weight: 500; opacity: 0; transition: all .3s; z-index: 2000;
  box-shadow: 0 4px 20px rgba(0,0,0,.4); pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok { border-left: 3px solid var(--ok); }
#toast.err { border-left: 3px solid var(--fault); }

/* ── RESPONSIVE ── */
@media(min-width:600px){
  .modal { border-radius: 16px; margin: 20px; max-height: 85vh; }
  .modal-overlay { align-items: center; }
}

/* ── WEEK VIEW ── */
.week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 16px; }
.week-day { background: var(--surface); border-radius: 8px; padding: 8px 4px; text-align: center; border: 1px solid var(--border); }
.week-day .wd-name { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing:.5px; }
.week-day .wd-date { font-size: 16px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif; margin: 2px 0; }
.week-day.today { border-color: var(--accent); }
.week-day.today .wd-date { color: var(--accent); }
.week-stat { font-size: 10px; font-weight: 600; padding: 2px 0; }

/* ── PCCC special grid ── */
.pccc-row { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 12px; }
@media(min-width:420px){ .pccc-row { grid-template-columns: repeat(3,1fr); } }

.check-item {
  background: var(--surface2); border-radius: 8px; padding: 12px 10px; text-align: center;
  cursor: pointer; border: 2px solid var(--border); transition: all .2s;
}
.check-item .ci-name { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.check-item .ci-status { font-size: 20px; }
.check-item.ok { border-color: var(--ok); background: var(--accent-dim); }
.check-item.ok .ci-name { color: var(--ok); }
.check-item.fault { border-color: var(--fault); background: var(--warn-dim); }
.check-item.fault .ci-name { color: var(--fault); }

/* Filter bar */
.filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.filter-chip {
  padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
  background: var(--surface2); color: var(--muted); border: 1px solid var(--border);
  cursor: pointer; transition: all .2s;
}
.filter-chip.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

.export-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer;
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px;
  transition: all .2s;
}
.export-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="brand">HK HOTEL</div>
      <div class="sub">Kỹ Thuật · Vận Hành</div>
    </div>
    <div class="form-group">
      <label>Mã nhân viên</label>
      <input type="text" id="loginId" placeholder="VD: KT01" autocomplete="off"/>
    </div>
    <div class="form-group">
      <label>Mật khẩu</label>
      <input type="password" id="loginPass" placeholder="••••••"/>
    </div>
    <button class="btn-login" onclick="doLogin()">Đăng nhập</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div id="appShell">
  <div class="top-bar">

      <button class="btn-logout" onclick="doLogout()">Đăng xuất</button>

  <div class="nav-tabs" id="navTabs">
    <div class="nav-tab active" data-tab="checkNgay">📋 Hàng Ngày</div>
    <div class="nav-tab" data-tab="hangMuc">🔧 Hạng Mục</div>
    <div class="nav-tab" data-tab="suaChua">🛏 Sửa Chữa</div>
    <div class="nav-tab" data-tab="dinhKy">🗓 Định Kỳ</div>
    <div class="nav-tab" data-tab="mayPhat">⚡ Máy Phát</div>
    <div class="nav-tab" data-tab="pccc">🔥 PCCC</div>
  </div>

  <div class="content">

    <div class="tab-panel active" id="tab-checkNgay">

      <div id="suaChuaList"><div class="spinner">Đang tải...</div></div>
    </div>

    <div class="tab-panel" id="tab-dinhKy">

          <input type="date" id="dateDinhKy"/>

        <button class="btn-today" onclick="openDinhKyNew()" style="white-space:nowrap">+ Thêm</button>

      <div id="dinhKyList"><div class="spinner">Đang tải...</div></div>

    <div class="tab-panel" id="tab-mayPhat">

    <div class="tab-panel" id="tab-pccc">

        <div class="date-bar" style="flex:1;margin:0;margin-right:10px">
          <label>Ngày</label>
          <input type="date" id="datePCCC"/>
          <button class="btn-today" onclick="setToday('datePCCC');loadPCCC()">Hôm nay</button>

      </div>

      <div id="pcccList"><div class="spinner">Đang tải...</div></div>
    </div>

  </div></div><div class="modal-overlay" id="modalCheckNgay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="mCheckNgayTitle">Ghi nhận kiểm tra</div>
      <button class="modal-close" onclick="closeModal('modalCheckNgay')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Vị trí / Thiết bị</label><input id="mCN_vitri" placeholder="VD: Tầng 2 - Máy lạnh phòng 201"/></div>
      <div class="field"><label>Nội dung công việc</label><input id="mCN_noidung" placeholder="VD: Kiểm tra nhiệt độ, lọc gió"/></div>
      <div class="field"><label>Tình trạng</label>
        <div class="radio-group">
          <div class="radio-btn ok" onclick="pickStatus(this,'
